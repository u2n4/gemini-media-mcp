# Publish VEO + NanoBanana to PyPI via OIDC Trusted Publisher
#
# Activation requirements (must be done BEFORE first tag push):
#   1. PyPI Trusted Publisher entries registered at:
#        https://pypi.org/manage/project/veo-mcp-server/settings/publishing/
#        https://pypi.org/manage/project/nanobanana-imagen-mcp/settings/publishing/
#      For BOTH:
#        - Owner: u2n4
#        - Repository: gemini-media-mcp
#        - Workflow filename: publish.yml
#        - Environment name: pypi
#   2. GitHub Environment "pypi" created at:
#        https://github.com/u2n4/gemini-media-mcp/settings/environments
#
# Triggers (per sub-package):
#   - tag `veo-v*.*.*`               -> publishes servers/veo
#   - tag `nanobanana-imagen-v*.*.*` -> publishes servers/nanobanana

name: Publish to PyPI

on:
  push:
    tags:
      - "veo-v*.*.*"
      - "nanobanana-imagen-v*.*.*"

jobs:
  publish-veo:
    if: startsWith(github.ref, 'refs/tags/veo-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build veo
        working-directory: servers/veo
        run: uv build

      - name: Publish veo to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: servers/veo/dist

  publish-nanobanana:
    if: startsWith(github.ref, 'refs/tags/nanobanana-imagen-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build nanobanana
        working-directory: servers/nanobanana
        run: uv build

      - name: Publish nanobanana to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: servers/nanobanana/dist
