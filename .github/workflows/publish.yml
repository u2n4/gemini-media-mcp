# Publish VEO + NanoBanana to PyPI via OIDC Trusted Publisher
#
# Activation steps (do these BEFORE uncommenting the blocks below):
#   1. Publish v1.1.0 manually once for EACH sub-package via `cd servers/<name> && uv publish`.
#   2. For EACH PyPI project:
#        https://pypi.org/manage/project/veo-mcp-server/settings/publishing/
#        https://pypi.org/manage/project/nanobanana-mcp-server/settings/publishing/
#      Add a Trusted Publisher:
#        - Publisher: GitHub
#        - Owner: u2n4
#        - Repository: gemini-media-mcp
#        - Workflow filename: publish.yml
#        - Environment name: pypi
#   3. In this repo, create Settings -> Environments -> "pypi".
#   4. Uncomment the blocks below and push a tag:
#        - tag `veo-v*.*.*`        -> publishes servers/veo
#        - tag `nanobanana-v*.*.*` -> publishes servers/nanobanana

name: Publish to PyPI

on:
  push:
    tags:
      - "veo-v*.*.*"
      - "nanobanana-v*.*.*"

